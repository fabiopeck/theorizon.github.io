<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Orizon Technologies | Inovação e Tecnologia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        
        /* Video Background */
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .video-container video { min-width: 100%; min-height: 100%; object-fit: cover; filter: brightness(0.4); }

        /* Content */
        .content { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 1rem; letter-spacing: -2px; }
        p { font-size: clamp(1rem, 2vw, 1.5rem); margin-bottom: 2rem; color: #ccc; text-transform: uppercase; letter-spacing: 5px; }
        
        .btn { padding: 15px 40px; border: 1px solid white; color: white; text-decoration: none; font-weight: bold; transition: 0.3s; background: transparent; }
        .btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div class="video-container">
        <div style="background: #000; height: 100%;"></div> 
    </div>

    <div class="content">
        <h1>THE ORIZON</h1>
        <p>Inovação e Tecnologia em Escala</p>
        <a href="mailto:contato@theorizon.com.br" class="btn">SAIBA MAIS</a>
    </div>

</body>
</html>
