<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Orizon Technologies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Container do Vídeo: Prioridade máxima na nitidez */
        .video-container { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
        }
        
        .video-container video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: left center; /* Foco total na lateral esquerda */
        }

        /* Área de Texto: Apenas o texto flutuando sem filtros no fundo */
        .content { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        h1 { 
            font-size: 6rem; 
            color: #ffffff; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); /* Sombra leve para garantir leitura sem embaçar o vídeo */
            letter-spacing: -2px;
        }
        
        p { 
            font-size: 1.5rem; 
            color: #ffffff; 
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            text-transform: uppercase; 
            letter-spacing: 8px; 
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content">
        <h1>THE ORIZON</h1>
        <p>Inovação e Tecnologia em Escala</p>
    </div>

</body>
</html>
